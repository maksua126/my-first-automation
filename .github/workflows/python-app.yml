name: Hourly Check

on:
  schedule:
    - cron: '0 * * * *'  # Запускати щогодини
  workflow_dispatch:      # Дозволяє запускати вручну кнопкою

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run test
        run: python test.py
